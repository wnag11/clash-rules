[custom]
; Hitun-style CF subscription conversion profile for /sub?config= external config.
; Keep this file in [custom] format. This subconverter imports /sub external configs from [custom], not pref.ini sections.

; Filter public-pool announcement/ad nodes.
exclude_remarks=(?i)(订阅|谨防|受骗|TG|telegram|群组|频道|@|免费|官网|客服|推广|机场|加入|联系|网址|剩余|流量|过期|到期)

; Disable emoji rewriting from the backend. Keep original node names except filtered ads.
add_emoji=false
remove_old_emoji=false

; ===== Direct / reject first =====
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; ===== OpenAI / Claude =====
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/openai-claude-extra.list
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 OpenAi,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/Claude.list

; ===== Small sites that need proxy =====
ruleset=🌍 International-Media,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/adult-extra.list

; ===== Service rules =====
ruleset=📲 Telegram,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=📹 YouTube,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/YouTube.list
ruleset=🎥 Netflix,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Netflix.list
ruleset=📺 巴哈姆特,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bahamut.list
ruleset=📺 Bilibili,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/BilibiliHMT.list
ruleset=📺 Bilibili,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Bilibili.list
ruleset=🌏 China-Media,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaMedia.list
ruleset=🌍 International-Media,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🍎 Apple,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=Ⓜ️ Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Bing.list
ruleset=Ⓜ️ Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/OneDrive.list
ruleset=Ⓜ️ Microsoft,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

; Steam store/community through proxy, SteamCN/download direct.
ruleset=🎮 Steam,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/steam-store.list
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list
ruleset=🎮 Steam,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Steam.list
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Download.list

; Generic proxy/direct lists.
ruleset=🔰 代理,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyGFWlist.list
ruleset=🔰 代理,https://raw.githubusercontent.com/UlinoyaPed/ShellClash/dev/lists/proxy.list
ruleset=🎯 直连,https://raw.githubusercontent.com/UlinoyaPed/ShellClash/dev/lists/direct.list
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

; CF egress pool. Use for CF VLESS nodes and Cloudflare IP destinations.
ruleset=☁️ CloudFlareCDN,https://raw.githubusercontent.com/cmliu/ACL4SSR/main/Clash/CloudflareCIDR.list
ruleset=☁️ CloudFlareCDN,[]GEOIP,cloudflare

ruleset=🎯 直连,[]GEOIP,LAN
ruleset=🎯 直连,[]GEOIP,CN
ruleset=🐟 Others,[]DST-PORT,80
ruleset=🐟 Others,[]DST-PORT,443
ruleset=🎯 直连,[]FINAL

custom_proxy_group=🔰 代理`select`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT`.*
custom_proxy_group=☑️ 手动切换`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🚑 故障转移`fallback`.*`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=☁️ CloudFlareCDN`select`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`.*

custom_proxy_group=📹 YouTube`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT
custom_proxy_group=📺 Bilibili`select`[]🎯 直连`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换
custom_proxy_group=🎥 Netflix`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT
custom_proxy_group=📲 Telegram`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT
custom_proxy_group=🎮 Steam`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🎯 直连
custom_proxy_group=🤖 OpenAi`select`[]☑️ 手动切换`[]🔰 代理`[]☁️ CloudFlareCDN`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT
custom_proxy_group=📺 巴哈姆特`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]DIRECT
custom_proxy_group=🍎 Apple`select`[]🎯 直连`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换
custom_proxy_group=Ⓜ️ Microsoft`select`[]🎯 直连`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换
custom_proxy_group=🌍 International-Media`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT
custom_proxy_group=🌏 China-Media`select`[]🎯 直连`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换
custom_proxy_group=🎯 直连`select`[]DIRECT`[]🔰 代理
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT
custom_proxy_group=🐟 Others`select`[]🔰 代理`[]☁️ CloudFlareCDN`[]☑️ 手动切换`[]♻️ 自动选择`[]🚑 故障转移`[]DIRECT

enable_rule_generator=true
overwrite_original_rules=true
