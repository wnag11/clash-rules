name: Sync Clash Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '20 3 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate flattened rules
        run: python scripts/sync_rules.py
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Sync generated Clash rules'
          file_pattern: generated/*.yaml
