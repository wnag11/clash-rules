; Galaxy V1 subscription conversion profile
; Repository: https://github.com/wnag11/clash-rules
; Raw: https://raw.githubusercontent.com/wnag11/clash-rules/main/subconverter/galaxy-v1.ini

[custom]
enable_rule_generator=true
overwrite_original_rules=true

; ===== Custom rule sets =====
ruleset=🐦 X服务,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/X.yaml
ruleset=💳 金融支付,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/Finance-Pay.yaml
ruleset=📈 金融资讯,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/Finance-Info.yaml
ruleset=☁️ 云服务,https://raw.githubusercontent.com/wnag11/clash-rules/main/rules/Cloud.yaml

; ===== Public rule sets =====
ruleset=🤖 AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
ruleset=🤖 AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
ruleset=🤖 AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
ruleset=🎬 YouTube,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
ruleset=🎞 Netflix,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
ruleset=📨 Telegram,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
ruleset=🐙 Github,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
ruleset=🌐 社交媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.yaml
ruleset=🌐 社交媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Instagram/Instagram.yaml
ruleset=🌐 社交媒体,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Reddit/Reddit.yaml
ruleset=☁️ 云服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Cloudflare/Cloudflare.yaml
ruleset=🌍 国外网站,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Proxy/Proxy.yaml
ruleset=DIRECT,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

; ===== Business policy groups =====
custom_proxy_group=🤖 AI服务`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=🐦 X服务`select`[]🏡 住宅节点`[]🏠 自建节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=💳 金融支付`select`[]🏡 住宅节点`[]🏠 自建节点`[]DIRECT
custom_proxy_group=📈 金融资讯`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🎞 Netflix`select`[]✈️ 机场节点`[]☁️ CF节点
custom_proxy_group=📨 Telegram`select`[]☁️ CF节点`[]✈️ 机场节点
custom_proxy_group=🐙 Github`select`[]DIRECT`[]☁️ CF节点`[]🏠 自建节点
custom_proxy_group=☁️ 云服务`select`[]DIRECT`[]🏠 自建节点
custom_proxy_group=🌐 社交媒体`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🌍 国外网站`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外网站

; ===== Exit groups =====
; V1.1: All exit groups are fully open. Public CF subscriptions use irregular names like 移动优选/电信优选/优选域名/香港/日本/美国, so strict regex grouping loses nodes.
; You can manually choose nodes inside each exit group.
custom_proxy_group=🏡 住宅节点`select`.*
custom_proxy_group=🏠 自建节点`select`.*
custom_proxy_group=☁️ CF节点`select`.*
custom_proxy_group=✈️ 机场节点`select`.*