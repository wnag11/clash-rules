[custom]
enable_rule_generator=true
overwrite_original_rules=true

; Galaxy Meta Edition: use GEOSITE/GEOIP rules, requires Mihomo/Clash.Meta core.
; Keep only a few custom DOMAIN rules for services not well covered by geosite.

; ===== Custom high-priority rules =====
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,tradingview.com
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,investing.com
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,coingecko.com
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,coinmarketcap.com
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,glassnode.com
ruleset=📈 金融资讯,[]DOMAIN-SUFFIX,defillama.com

ruleset=💳 金融支付,[]DOMAIN-SUFFIX,paypal.com
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,paypalobjects.com
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,wise.com
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,stripe.com
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,stripe.network
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,binance.com
ruleset=💳 金融支付,[]DOMAIN-SUFFIX,coinbase.com

; ===== GEOSITE rules =====
ruleset=🤖 AI服务,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,anthropic
ruleset=🤖 AI服务,[]GEOSITE,google-gemini
ruleset=🐦 X服务,[]GEOSITE,twitter
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎞 Netflix,[]GEOSITE,netflix
ruleset=📨 Telegram,[]GEOSITE,telegram
ruleset=🐙 Github,[]GEOSITE,github
ruleset=☁️ 云服务,[]GEOSITE,cloudflare
ruleset=☁️ 云服务,[]GEOSITE,microsoft
ruleset=🌐 社交媒体,[]GEOSITE,facebook
ruleset=🌐 社交媒体,[]GEOSITE,instagram
ruleset=🌐 社交媒体,[]GEOSITE,reddit
ruleset=🌐 社交媒体,[]GEOSITE,wikipedia

; ===== Direct / fallback =====
ruleset=DIRECT,[]GEOSITE,geolocation-cn
ruleset=DIRECT,[]GEOIP,CN
ruleset=🌍 国外网站,[]GEOSITE,geolocation-!cn
ruleset=🐟 漏网之鱼,[]FINAL

; ===== Business policy groups =====
custom_proxy_group=🤖 AI服务`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=🐦 X服务`select`[]🏡 住宅节点`[]🏠 自建节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=💳 金融支付`select`[]🏡 住宅节点`[]🏠 自建节点`[]DIRECT
custom_proxy_group=📈 金融资讯`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🎞 Netflix`select`[]✈️ 机场节点`[]☁️ CF节点
custom_proxy_group=📨 Telegram`select`[]☁️ CF节点`[]✈️ 机场节点
custom_proxy_group=🐙 Github`select`[]DIRECT`[]☁️ CF节点`[]🏠 自建节点
custom_proxy_group=☁️ 云服务`select`[]DIRECT`[]🏠 自建节点
custom_proxy_group=🌐 社交媒体`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🌍 国外网站`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外网站

; ===== Exit groups: all nodes visible, manual selection =====
custom_proxy_group=🏡 住宅节点`select`.*
custom_proxy_group=🏠 自建节点`select`.*
custom_proxy_group=☁️ CF节点`select`.*
custom_proxy_group=✈️ 机场节点`select`.*
