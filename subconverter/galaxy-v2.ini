[custom]
enable_rule_generator=true
overwrite_original_rules=true

; Galaxy V2: use flattened generated rules from this repo only.
ruleset=🤖 AI服务,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/AI.yaml
ruleset=🐦 X服务,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/X.yaml
ruleset=💳 金融支付,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Finance-Pay.yaml
ruleset=📈 金融资讯,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Finance-Info.yaml
ruleset=🎬 YouTube,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/YouTube.yaml
ruleset=🎞 Netflix,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Netflix.yaml
ruleset=📨 Telegram,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Telegram.yaml
ruleset=🐙 Github,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Github.yaml
ruleset=☁️ 云服务,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Cloud.yaml
ruleset=🌐 社交媒体,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Social.yaml
ruleset=🌍 国外网站,https://raw.githubusercontent.com/wnag11/clash-rules/main/generated/Proxy.yaml
ruleset=DIRECT,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL

custom_proxy_group=🤖 AI服务`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=🐦 X服务`select`[]🏡 住宅节点`[]🏠 自建节点`[]☁️ CF节点`[]✈️ 机场节点`[]DIRECT
custom_proxy_group=💳 金融支付`select`[]🏡 住宅节点`[]🏠 自建节点`[]DIRECT
custom_proxy_group=📈 金融资讯`select`[]🏠 自建节点`[]🏡 住宅节点`[]☁️ CF节点`[]DIRECT
custom_proxy_group=🎬 YouTube`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🎞 Netflix`select`[]✈️ 机场节点`[]☁️ CF节点
custom_proxy_group=📨 Telegram`select`[]☁️ CF节点`[]✈️ 机场节点
custom_proxy_group=🐙 Github`select`[]DIRECT`[]☁️ CF节点`[]🏠 自建节点
custom_proxy_group=☁️ 云服务`select`[]DIRECT`[]🏠 自建节点
custom_proxy_group=🌐 社交媒体`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🌍 国外网站`select`[]☁️ CF节点`[]✈️ 机场节点`[]🏠 自建节点
custom_proxy_group=🐟 漏网之鱼`select`[]🌍 国外网站
custom_proxy_group=🏡 住宅节点`select`.*
custom_proxy_group=🏠 自建节点`select`.*
custom_proxy_group=☁️ CF节点`select`.*
custom_proxy_group=✈️ 机场节点`select`.*
